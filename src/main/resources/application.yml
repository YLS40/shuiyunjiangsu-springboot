server:
  port: 8098

# 数据库配置（保留原有，已适配MyBatis-Plus）
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/xm_travel?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true

# ========== 核心优化：合并MyBatis和MyBatis-Plus配置，避免冲突 ==========
# MyBatis-Plus 为主配置（兼容原生MyBatis），删除重复的MyBatis配置
mybatis-plus:
  configuration:
    # 开启驼峰命名转换（数据库create_time → 实体类createTime）
    map-underscore-to-camel-case: true
    # 打印SQL日志（调试用，生产可关闭）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 开启延迟加载（可选，提升性能）
    lazy-loading-enabled: true
  # Mapper XML文件路径（和你的项目结构一致）
  mapper-locations: classpath:mapper/*.xml
  # 实体类包路径（自动识别实体类，避免映射错误）
  type-aliases-package: com.example.entity
  # 全局配置（可选，优化主键生成策略）
  global-config:
    db-config:
      id-type: auto # 主键自增（和reservation表的id字段一致）

# 保留原有MyBatis配置（仅作兼容，实际用MyBatis-Plus的配置）
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

# 静态文件/文件访问配置
fileBaseUrl: http://localhost:${server.port}

# 支付宝配置（保留原有，不影响数据库接口）
alipay:
  appId: 9021000131669700
  appPrivateKey: 
  alipayPublicKey: 
  notifyUrl: http://htx472.natappfree.cc/alipay/notify